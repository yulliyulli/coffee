<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/coffee-icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>☕ 커피 주문</title>
  <meta name="description" content="커피 주문 시스템" />

  <!-- 폰트 추가 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /* 로딩 스피너 */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #FFFBF5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #3A3330;
      font-family: 'Noto Sans KR', sans-serif;
      z-index: 9999;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #E8E0D8;
      border-top: 4px solid #C8A67E;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 1.2rem;
      font-weight: 500;
      color: #5D4E42;
    }

    /* 전역 스타일 리셋 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      line-height: 1.6;
      color: #3A3330;
      background-color: #FFFBF5;
    }

    /* 숨김 처리 */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- 로딩 화면 -->
  <div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">☕ 커피 주문 시스템 로딩 중...</div>
  </div>

  <!-- Vue 앱 마운트 포인트 -->
  <div id="app"></div>

  <!-- Vue 앱 스크립트 -->
  <script type="module" src="/src/main.js"></script>

  <!-- 로딩 완료 후 로딩 화면 숨김 -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.classList.add('hidden');
        }
      }, 1000); // 1초 후 로딩 화면 숨김
    });

    // Vue 앱이 마운트된 후 로딩 화면 숨김
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        const app = document.getElementById('app');
        if (app && app.children.length > 0) {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.classList.add('hidden');
          }
        }
      }, 500);
    });
  </script>
</body>
</html>
